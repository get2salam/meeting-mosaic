<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Meeting Mosaic preview</title>
  <desc id="desc">Preview artwork for Meeting Mosaic, a local-first board for meeting fragments.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#050911" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#f0abfc" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="36" y="32" width="888" height="84" rx="24" fill="#151022" stroke="#524086" />
  <text x="66" y="72" font-family="Inter, Arial, sans-serif" font-size="28" fill="#eef2ff">Meeting Mosaic</text>
  <text x="66" y="96" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b7c0d9">Turn scattered meeting notes into structured decisions, actions, and follow-ups.</text>

  <rect x="36" y="138" width="888" height="118" rx="28" fill="#151022" stroke="#524086" />
  <rect x="62" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
  <rect x="264" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
  <rect x="466" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
  <rect x="668" y="164" width="230" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
