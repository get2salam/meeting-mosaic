  <text x="84" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">8</text>
  <text x="286" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Clarity</text>
  <text x="286" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">8.4</text>
  <text x="488" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Next review</text>
  <text x="488" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">04-25</text>
  <text x="690" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Top state</text>
  <text x="690" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">Aligned</text>

  <rect x="36" y="278" width="522" height="226" rx="28" fill="#151022" stroke="#524086" />
  <text x="62" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">What needs a response next</text>
  <text x="62" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Visible next move, dates, and clarity in one clean queue.</text>
  <rect x="62" y="356" width="470" height="54" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
  <text x="84" y="388" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Pilot pricing decision</text>
  <text x="310" y="388" font-family="Inter, Arial, sans-serif" font-size="12" fill="#d5deff">Abdul · 8/10</text>
  <rect x="62" y="422" width="470" height="54" rx="18" fill="rgba(255,255,255,0.04)" stroke="#524086" />
  <text x="84" y="454" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Client wants async updates</text>
  <text x="310" y="454" font-family="Inter, Arial, sans-serif" font-size="12" fill="#d5deff">Send weekly format sample · Waiting</text>

  <rect x="584" y="278" width="340" height="226" rx="28" fill="#151022" stroke="#524086" />
  <text x="610" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Where the meeting energy landed</text>
  <text x="610" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">A quick view of category balance and the strongest clarity signal.</text>
