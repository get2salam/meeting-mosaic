<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Mosaic</title>
    <meta name="description" content="Turn scattered meeting notes into structured decisions, actions, and follow-ups." />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body style="--primary:#fb7185;--secondary:#fda4af;--panel:#1c0f17;--edge:#5b2738;--glow:rgba(251, 113, 133, 0.22)">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first micro app</p>
          <h1>Meeting Mosaic</h1>
          <p class="lede">Turn scattered meeting notes into structured decisions, actions, and follow-ups.</p>
        </div>
        <div class="actions">
          <button class="btn" data-action="import">Import</button>
          <button class="btn" data-action="export">Export</button>
          <button class="btn btn-primary" data-action="new">New note</button>
          <input id="import-file" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <section class="hero card">
        <div>
          <p class="eyebrow">Notes board</p>
          <h2 data-role="board-title"></h2>
          <p data-role="board-subtitle"></p>
        </div>
        <p class="accent">Good meetings fade fast unless the decisions stay visible.</p>
      </section>

      <section class="stats" data-role="stats"></section>

      <section class="controls card">
        <label>
          <span>Search</span>
          <input type="search" data-field="search" placeholder="Search notes..." />
        </label>
        <label>
          <span>Note type</span>
          <select data-field="category"></select>
        </label>
        <label>
          <span>Status</span>
          <select data-field="status"></select>
        </label>
        <button class="btn" type="button" data-action="reset">Re-seed sample</button>
      </section>

      <section class="workspace">
        <article class="card list-panel">
          <div class="panel-head">
            <div>
              <strong>Notes</strong>
              <p>Sorted by signal minus friction.</p>
            </div>
            <span class="chip" data-role="count"></span>
          </div>
          <div class="list" data-role="list"></div>
        </article>
        <article class="card editor-panel" data-role="editor"></article>
      </section>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
